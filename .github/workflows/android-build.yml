name: Android Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Jarvis Debug APK
    runs-on: ubuntu-latest

    # Do not use ${{ runner.temp }} here. Older GitHub validation rejects the
    # runner context in this position, which causes the workflow file to be
    # marked invalid before it even starts.
    env:
      ANDROID_SDK_ROOT: /tmp/jarvis-android-sdk
      ANDROID_HOME: /tmp/jarvis-android-sdk
      GRADLE_USER_HOME: /tmp/jarvis-gradle-home
      TERM: dumb

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up JDK 17 for Android SDK manager
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install clean Android SDK 29
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$ANDROID_SDK_ROOT"

          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          echo "Using sdkmanager: $SDKMANAGER"
          java -version

          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" --licenses >/dev/null || true

          "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" \
            "platforms;android-29" \
            "build-tools;29.0.3"

          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          "$ANDROID_SDK_ROOT/platform-tools/adb" version || true

      - name: Set up JDK 8 for old Gradle/AGP build
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: Jarvis-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
